<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link  rel="stylesheet" href="style.css"/>
</head>
<body>
    <!-- Task 1 -->
    <form id="form">
        <input type="text" id="name" placeholder="Enter your name" required />
        <input type="email" id="email" placeholder="Enter your email" required />
        <button type="submit">Submit</button>
    </form>
    <hr>

    <!-- Task 2 -->
    <textarea id="note"></textarea>
    <button id="saveBtn">Save Note</button>
    <hr>

    <!-- Task 3 -->

    <h2>Welcome to Our Website!</h2>
    <p>This page includes a cookie.</p>
    <div id="cookie-banner">
        This website uses cookies to enhance the user experience.
        <button id="accept-btn">Accept</button>
    </div>
    <hr>

    <!-- Task 4 -->
    <button id="clear-all-btn">Clear All</button>
    <hr>

    <!-- Task 5 -->
    <button id="getJoke">Get Joke</button>
    <div id="showJoke"></div>
    <hr>

    <!-- Task 6 -->
    <button id="counter">Start Countdown</button>
    <div id="count-display" style="font-size: 2em; margin-top: 10px;"></div>
    <hr>

    <!-- Task 7 -->
    <button id="start">Start Ticking</button>
    <button id="stop">Stop Ticking</button>
    <div id="tick-output" style="margin-top: 10px; font-weight: bold;"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
